<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Placement Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-20 bg-slate-900 text-white flex items-center justify-between px-8 shadow-md z-10">
        <div class="flex items-center">
            <i class="fas fa-rocket text-indigo-400 text-2xl mr-3"></i>
            <span class="text-xl font-bold tracking-wide">Student Portal.</span>
        </div>
        <div class="flex items-center space-x-6">
            <span class="font-medium text-slate-300" id="headerName">Loading...</span>
            <button onclick="logout()" class="text-slate-400 hover:text-white transition-colors" title="Log Out">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8 flex justify-center items-start">
        <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <div class="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 border-4 border-white shadow-md">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800" id="displayName">--</h2>
                    <p class="text-sm text-indigo-600 font-bold mt-1 bg-indigo-50 inline-block px-3 py-1 rounded-full" id="displayPRN">--</p>
                    
                    <div class="mt-8 text-left space-y-4 pt-6 border-t border-slate-100">
                        <div>
                            <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Registration No.</p>
                            <p class="text-slate-800 font-semibold" id="displayReg">--</p>
                        </div>
                        </div>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="mb-8 pb-6 border-b border-slate-100 flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">Complete Your Profile</h2>
                            <p class="text-sm text-slate-500 mt-1">Update your contact details and academics for placement drives.</p>
                        </div>
                    </div>

                    <form id="updateProfileForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                                <div class="relative">
                                    <i class="fas fa-envelope absolute left-4 top-3.5 text-slate-400"></i>
                                    <input type="email" id="editEmail" required placeholder="student@college.edu" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Mobile Number</label>
                                <div class="relative">
                                    <i class="fas fa-phone absolute left-4 top-3.5 text-slate-400"></i>
                                    <input type="text" id="editMobile" required placeholder="10-digit number" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">10th Marks (%)</label>
                                <div class="relative">
                                    <i class="fas fa-percentage absolute left-4 top-3.5 text-slate-400"></i>
                                    <input type="number" step="0.01" max="100" id="edit10th" required placeholder="e.g. 85.5" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">12th/Diploma (%)</label>
                                <div class="relative">
                                    <i class="fas fa-percentage absolute left-4 top-3.5 text-slate-400"></i>
                                    <input type="number" step="0.01" max="100" id="edit12th" required placeholder="e.g. 80.0" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Current CGPA</label>
                                <div class="relative">
                                    <i class="fas fa-chart-bar absolute left-4 top-3.5 text-slate-400"></i>
                                    <input type="number" step="0.01" max="10" id="editCGPA" required placeholder="e.g. 8.5" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                                </div>
                            </div>
                        </div>

                        <div class="pt-6 border-t border-slate-100">
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-indigo-200 flex justify-center items-center">
                                <i class="fas fa-save mr-2"></i> Save Profile Details
                            </button>
                        </div>
                        <div id="updateMessage" class="text-center text-sm font-medium hidden p-4 rounded-xl mt-4"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const loggedInPRN = localStorage.getItem('studentPRN');

        if (!loggedInPRN) {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`http://localhost:3000/api/students/${loggedInPRN}`);
                const student = await response.json();

                if (response.ok) {
                    // Populate locked fields
                    document.getElementById('headerName').textContent = student.name;
                    document.getElementById('displayName').textContent = student.name;
                    document.getElementById('displayPRN').textContent = student.prn_number;
                    document.getElementById('displayReg').textContent = student.registration_number;

                    // Populate editable fields
                    document.getElementById('editEmail').value = student.email || '';
                    document.getElementById('editMobile').value = student.mobile || '';
                    document.getElementById('editCGPA').value = student.cgpa || '';
                    document.getElementById('edit10th').value = student.marks_10th || '';
                    document.getElementById('edit12th').value = student.marks_12th_diploma || '';
                }
            } catch (error) {
                alert("Failed to connect to database. Please ensure the server is running.");
            }
        });

        document.getElementById('updateProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button');
            const msgBox = document.getElementById('updateMessage');
            
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...';
            submitBtn.disabled = true;

            // Grab the new data including 10th and 12th marks
            const updatedData = {
                email: document.getElementById('editEmail').value,
                mobile: document.getElementById('editMobile').value,
                cgpa: document.getElementById('editCGPA').value,
                marks10th: document.getElementById('edit10th').value,
                marks12th: document.getElementById('edit12th').value
            };

            try {
                const response = await fetch(`http://localhost:3000/api/students/${loggedInPRN}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                msgBox.classList.remove('hidden');
                if (response.ok) {
                    msgBox.textContent = "Profile updated successfully!";
                    msgBox.className = 'text-center text-sm font-bold p-4 rounded-xl mt-4 bg-green-50 text-green-700 block';
                } else {
                    msgBox.textContent = result.error;
                    msgBox.className = 'text-center text-sm font-bold p-4 rounded-xl mt-4 bg-red-50 text-red-700 block';
                }
            } catch (error) {
                msgBox.textContent = "Server error. Could not save.";
                msgBox.className = 'text-center text-sm font-bold p-4 rounded-xl mt-4 bg-red-50 text-red-700 block';
            } finally {
                submitBtn.innerHTML = '<i class="fas fa-save mr-2"></i> Save Profile Details';
                submitBtn.disabled = false;
            }
        });

        function logout() {
            localStorage.removeItem('studentPRN');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
